<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nekolessi Profile</title>
    <meta name="description" content="Stylized GitHub Pages profile landing page." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Chakra+Petch:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWix+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkR4j8LJgyAHIhR35VZc2oM/gI1wQteU7mA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-photo" aria-hidden="true"></div>
    <div class="bg-overlay" aria-hidden="true"></div>

    <main class="shell">
      <section class="card hero">
        <div class="hero-top">
          <div class="stats"><i class="fa-solid fa-eye"></i> 235</div>
          <div class="stats"><i class="fa-solid fa-location-dot"></i> USA</div>
        </div>

        <div class="avatar-wrap">
          <img
            src="https://images.unsplash.com/photo-1611003229182-7e27f26b9577?auto=format&fit=crop&w=480&q=80"
            alt="Profile avatar"
          />
          <span class="heart heart-1"><i class="fa-solid fa-heart"></i></span>
          <span class="heart heart-2"><i class="fa-solid fa-heart"></i></span>
          <span class="heart heart-3"><i class="fa-solid fa-heart"></i></span>
        </div>

        <h1>
          NEKOLESSI
          <span class="orb"><i class="fa-solid fa-wand-magic-sparkles"></i></span>
        </h1>

        <p class="bio">
          OH HAII~ I'M JUST A HOPELESS GIRLFAILURE... SPEND MY FREE TIME WATCHING VTUBERS &amp; MAKING ART WHEN MY BRAIN ALLOWS.
        </p>

        <nav class="socials" aria-label="social links">
          <a href="#" aria-label="Mail"><i class="fa-solid fa-envelope"></i></a>
          <a href="#" aria-label="Twitch"><i class="fa-brands fa-twitch"></i></a>
          <a href="#" aria-label="Steam"><i class="fa-brands fa-steam"></i></a>
          <a href="#" aria-label="Spotify"><i class="fa-brands fa-spotify"></i></a>
          <a href="#" aria-label="Discord"><i class="fa-brands fa-discord"></i></a>
          <a href="#" aria-label="Telegram"><i class="fa-brands fa-telegram"></i></a>
        </nav>
      </section>

      <section class="card status">
        <img
          class="status-avatar"
          src="https://images.unsplash.com/photo-1578632292335-df3abbb0d586?auto=format&fit=crop&w=240&q=80"
          alt="Secondary avatar"
        />
        <div>
          <p class="status-name">NEKOLESSI <span class="check"><i class="fa-solid fa-circle-check"></i></span></p>
          <p class="status-note"><i class="fa-brands fa-twitch"></i> HEADPAT PRINCESS</p>
        </div>
      </section>

      <section class="card player">
        <img
          class="album"
          src="https://images.unsplash.com/photo-1487215078519-e21cc028cb29?auto=format&fit=crop&w=300&q=80"
          alt="Album art"
        />
        <div class="track">
          <p class="track-name">LOST</p>
          <div class="timeline">
            <span class="time" id="currentTime">2:57</span>
            <div class="bar">
              <div class="bar-fill" id="progressFill"></div>
            </div>
            <span class="time">5:51</span>
          </div>
        </div>
        <div class="controls" aria-hidden="true">
          <i class="fa-solid fa-backward-step"></i>
          <i class="fa-solid fa-pause"></i>
          <i class="fa-solid fa-forward-step"></i>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
